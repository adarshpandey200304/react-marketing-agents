# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# React (Vite) SPA → Azure App Service (Linux, Node).
# NOTE: all VITE_* values are baked in at BUILD time (the `npm run build` step),
# NOT read at runtime — so they are injected as env on the build step from GitHub
# secrets. Setting them as App Service Application Settings would have no effect.

name: Build and deploy React app to Azure Web App - mrkgt-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        # Build-time env → baked into dist/. VITE_DEV_AUTH MUST be false in prod.
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_DEV_AUTH: 'false'
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: react-app
          path: dist # only the built static output is deployed

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # required for requesting the OIDC JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: react-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # These three secrets are created automatically when you wire up the app's
          # Deployment Center (GitHub Actions) in the Portal. Paste the exact names
          # Azure generated for mrkgt-frontend (the random suffixes differ per app).
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FRONTEND }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FRONTEND }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FRONTEND }}

      - name: Stop Web App to release deployment lock
        run: az webapp stop --name mrkgt-frontend --resource-group RG-Marketing-Agents

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'mrkgt-frontend'
          slot-name: 'Production'
          package: dist
          clean: true

      - name: Start Web App
        if: always()
        run: az webapp start --name mrkgt-frontend --resource-group RG-Marketing-Agents
