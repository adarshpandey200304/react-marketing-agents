<div class="hidden sm:block">
<h1 class="font-headline-md text-headline-md bg-gradient-to-r from-[#00cc92] to-secondary-fixed bg-clip-text text-transparent inline-block">Marketing Agents</h1>
<p class="font-label-sm text-label-sm text-outline hidden md:inline-block ml-3 font-normal border-l border-outline-variant/30 pl-3">Content Briefing · Consumer Insights · Story Hooks</p>
</div>
</div>
<!-- Right: Status & Actions -->
<div class="flex items-center gap-5">
<!-- Status -->
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#00cc92] shadow-[0_0_8px_rgba(0,204,146,0.6)]"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Connected</span>
</div>
<!-- Locale Toggle -->
<div class="flex bg-surface-container-high rounded-full p-1 border border-outline-variant/20">
<button class="px-3 py-1 rounded-full bg-surface-container-lowest shadow-sm font-label-sm text-label-sm text-on-surface font-semibold">EN</button>
<button class="px-3 py-1 rounded-full font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors">DE</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center pt-[60px] pb-[100px] px-container-padding max-w-max-width-chat mx-auto w-full relative z-10">
<!-- Welcome Header -->
<div class="text-center mb-12 animate-[fadeIn_0.5s_ease-out]">
<h2 class="font-headline-lg text-[32px] leading-tight font-bold text-on-surface-variant mb-3">How can I help with your campaign today?</h2>
<p class="font-body-md text-body-md text-outline text-lg">Start a new briefing or explore insights below.</p>
</div>
<!-- Feature Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-[800px]">
<!-- Card 1 -->
<button class="flex flex-col items-start p-6 rounded-xl bg-surface-container-lowest border border-outline-variant/30 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 group text-left">
<div class="w-12 h-12 rounded-lg bg-primary-container/20 flex items-center justify-center text-primary-dim mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="description" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2 group-hover:text-primary transition-colors">Content Briefing</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Generate a structured content briefing from uploaded documents.</p>
</button>
<!-- Card 2 -->
<button class="flex flex-col items-start p-6 rounded-xl bg-surface-container-lowest border border-outline-variant/30 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 group text-left">
<div class="w-12 h-12 rounded-lg bg-secondary-container/20 flex items-center justify-center text-secondary-dim mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2 group-hover:text-secondary transition-colors">Consumer Insights</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Audience and trend analysis.</p>
</button>
<!-- Card 3 -->
<button class="flex flex-col items-start p-6 rounded-xl bg-surface-container-lowest border border-outline-variant/30 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 group text-left">
<div class="w-12 h-12 rounded-lg bg-tertiary-container/30 flex items-center justify-center text-[#00cc92] mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2 group-hover:text-[#00cc92] transition-colors">Q&amp;A / Story Hooks</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Ask questions and get creative story hooks.</p>
</button>
</div>
</main>
<!-- Composer (Bottom Fixed) -->
<div class="fixed bottom-0 w-full bg-gradient-to-t from-background via-background/95 to-transparent pb-6 pt-10 px-container-padding z-40 flex justify-center">
<div class="w-full max-w-[760px] relative">
<!-- Input Wrapper -->
<div class="flex items-end gap-3 bg-surface-container-lowest rounded-2xl border border-outline-variant/40 shadow-lg shadow-surface-container-highest/20 p-2 pl-4 focus-within:border-[#00cc92]/50 focus-within:ring-1 focus-within:ring-[#00cc92]/20 transition-all bg-white">
<!-- Attachment Button -->
<button aria-label="Attach Document" class="p-2 text-outline hover:text-on-surface rounded-full hover:bg-surface-container-low transition-colors mb-1">
<span class="material-symbols-outlined text-[20px]" data-icon="attach_file">attach_file</span>
</button>
<!-- Textarea -->
<textarea class="flex-1 bg-transparent border-none focus:ring-0 resize-none max-h-[120px] min-h-[44px] py-3 text-on-surface font-body-md text-body-md placeholder:text-outline-variant" placeholder="Ask anything, or attach a document..." rows="1" style="field-sizing: content;"></textarea>
<!-- Send Button -->
<button aria-label="Send Message" class="p-3 rounded-full bg-gradient-to-r from-[#00cc92] to-[#00b380] text-white shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center mb-1 group">
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-0.5 transition-transform" data-icon="arrow_upward">arrow_upward</span>
</button>
</div>
<div class="text-center mt-3">
<p class="font-label-sm text-label-sm text-outline-variant text-[11px]">Marketing Agents can make mistakes. Consider verifying important information.</p>
</div>
</div>
</div>
<style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
