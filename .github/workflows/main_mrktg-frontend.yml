# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# React (Vite) SPA → Azure App Service (Linux, Node). Builds dist/ and deploys
# ONLY the built static output (NOT the repo source). All VITE_* values are baked
# in at build time from GitHub secrets — they are not read at runtime.

name: Build and deploy Node.js app to Azure Web App - mrktg-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and build
        # VITE_* are baked into dist/ here. VITE_DEV_AUTH MUST be false in prod.
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_DEV_AUTH: 'false'
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist # only the built output, not the repo source

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A4B7953C72D849C2B6A56C5F631921D6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E28A5C945EF14202AC69FB09B8B3769F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E72A9B3D0BF94D47BD142AEF5B6FD85C }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mrktg-frontend'
          slot-name: 'Production'
          package: dist # deploy the built SPA; clean wipes the stale dev source
          clean: true
